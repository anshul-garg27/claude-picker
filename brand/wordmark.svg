<?xml version="1.0" encoding="UTF-8"?>
<!--
  claude-picker — horizontal wordmark lockup.
  Glyph (left) + "claude-picker" wordmark (right), set in JetBrains Mono Bold.
  Glyph height 40u. Wordmark cap height ≈ 40u → font-size 44 (JetBrains Mono cap ≈ 0.73em).
  Gap between glyph and wordmark ≈ 0.5× glyph width (13u).

  TEXT NOTE:
  Uses <text> with font-family fallback chain. For distribution / embedded artifacts where
  the font may not be available, outline the text before export (see brand.md §export).

  viewBox: 470 × 40 → glyph 52 + gap 13 + wordmark ~405. Right edge trimmed to the
  last visible glyph of the wordmark so the lockup has no dead space.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 470 40" fill="#CBA6F7">
  <!-- Glyph — identical to logo.svg -->
  <path d="M 0 0 L 22 20 L 0 40 L 0 29 L 11 20 L 0 11 Z"/>
  <rect x="28" y="15" width="24" height="10" rx="5" ry="5"/>

  <!-- Wordmark -->
  <text x="65" y="33"
        font-family="'JetBrains Mono', 'Fira Code', ui-monospace, Menlo, Consolas, monospace"
        font-weight="700"
        font-size="44"
        letter-spacing="-1"
        fill="#CBA6F7">claude-picker</text>
</svg>
