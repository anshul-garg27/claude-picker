<?xml version="1.0" encoding="UTF-8"?>
<!--
  claude-picker — favicon, pixel-crisp at 16x16.
  Same 4-dot geometry as logo.svg, tuned for micro rendering.
  Uses the full 16-unit viewBox so each dot aligns to integer pixels at 16x16:
    - Rounded squares: 6x6, radius 1.5, at (1,1), (9,1), (1,9)
    - Circle: cx=12, cy=12, r=2.5 (diameter 5px — one pixel smaller than a square
      so the shape difference reads even at 16x16)
    - Gap between dots: 2 units (2px at 16x16)
    - 1-unit margin around the grid footprint

  Color: #CBA6F7 on transparent. Place against dark or light as needed.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="#CBA6F7">
  <rect x="1" y="1" width="6" height="6" rx="1.5" ry="1.5"/>
  <rect x="9" y="1" width="6" height="6" rx="1.5" ry="1.5"/>
  <rect x="1" y="9" width="6" height="6" rx="1.5" ry="1.5"/>
  <circle cx="12" cy="12" r="2.5"/>
</svg>
