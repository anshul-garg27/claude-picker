<?xml version="1.0" encoding="UTF-8"?>
<!--
  claude-picker — alternate / secondary mark: "The Picker Caret"
  PRESERVED from the first design pass. Not the canonical logo.
  The canonical mark is the 4-dot grid in logo.svg.

  Concept: a filled right-pointing chevron (fzf cursor) next to a rounded pill
  (the selected row). Kept as a secondary motif for merch, interior branding,
  and CLI-native contexts where a line-of-text feel is appropriate.

  NEVER interchange with the primary 4-dot mark. See brand.md § Alternate mark.

  Color: Catppuccin Mauve #CBA6F7. Single color. No strokes. No gradients.
  viewBox matches the mark's bounding box (52 × 40).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 40" fill="#CBA6F7">
  <!--
    Chevron ">" — single filled polygon, clockwise:
    outer-top-left (0,0) -> tip (22,20) -> outer-bottom-left (0,40)
      -> inner-bottom (0,29) -> inner-notch (11,20) -> inner-top (0,11) -> close.
    11u-thick right-pointing angle bracket.
  -->
  <path d="M 0 0 L 22 20 L 0 40 L 0 29 L 11 20 L 0 11 Z"/>
  <!-- Selected-row pill: 24u x 10u, radius 5u, vertically centered on chevron tip (y=20) -->
  <rect x="28" y="15" width="24" height="10" rx="5" ry="5"/>
</svg>
