<?xml version="1.0" encoding="UTF-8"?>
<!--
  claude-picker — primary mark on dark tile.
  128x128 canvas: #1E1E2E background, 4-dot mark centered with 1x-dot clearspace.
  Use for: GitHub profile avatar, OG image base, dark social preview tile.

  The mark occupies a 64x64 region centered on a 128x128 canvas.
  Grid cell size inside that inner region is identical to logo.svg — rect 24,
  circle r=10 — preserving every proportion.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Dark Catppuccin Base tile -->
  <rect width="128" height="128" fill="#1E1E2E"/>
  <!--
    Mark centered. Inner grid footprint 52x52, offset (38, 38) so that
    the grid center lands at (64, 64).
    Cell top-left corners:
      top-left     (38, 38)
      top-right    (66, 38)
      bottom-left  (38, 66)
      bottom-right (66, 66) - circle center (78, 78), r 10
  -->
  <g fill="#CBA6F7">
    <rect x="38" y="38" width="24" height="24" rx="6" ry="6"/>
    <rect x="66" y="38" width="24" height="24" rx="6" ry="6"/>
    <rect x="38" y="66" width="24" height="24" rx="6" ry="6"/>
    <circle cx="78" cy="78" r="10"/>
  </g>
</svg>
