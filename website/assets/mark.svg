<?xml version="1.0" encoding="UTF-8"?>
<!--
  claude-picker — PRIMARY MARK: "The 4-Dot Picker"
  A 2x2 grid of four dots: three filled rounded squares + one filled circle.
  The circle sits in the bottom-right cell as the "selected" cursor.

  Concept: "A picker showing 4 items, with the cursor on one."
  - 3 rounded squares  = unselected sessions
  - 1 circle (bottom-right) = the currently selected session (cursor)

  Color: single fill #CBA6F7 (Catppuccin Mauve). No strokes, gradients, or shadows.
  viewBox 0 0 64 64. Tight composition with 6u edge clearspace.

  Geometry (all in SVG user units):
    - Each rounded square: 24 x 24, corner radius 6
    - Circle: r = 10 (so diameter 20, slightly smaller than a 24-square to
      create a clear visual hierarchy where the circle reads as "different")
    - Gap between dots (both axes): 4
    - Grid footprint: 52 x 52, offset by (6, 6) inside the 64 x 64 canvas
    - Cell centers: (18, 18), (46, 18), (18, 46), (46, 46)

  Minimum-size read:
    At 16x16 the grid is 13px wide, each square ~6px with 1px corners and the
    circle ~5px diameter. All four dots remain distinguishable, and the
    circle vs. square contrast survives.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="#CBA6F7">
  <!-- Top-left: unselected session -->
  <rect x="6"  y="6"  width="24" height="24" rx="6" ry="6"/>
  <!-- Top-right: unselected session -->
  <rect x="34" y="6"  width="24" height="24" rx="6" ry="6"/>
  <!-- Bottom-left: unselected session -->
  <rect x="6"  y="34" width="24" height="24" rx="6" ry="6"/>
  <!-- Bottom-right: SELECTED session (the picker cursor) -->
  <circle cx="46" cy="46" r="10"/>
</svg>
