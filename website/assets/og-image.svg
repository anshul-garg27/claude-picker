<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <rect width="1200" height="630" fill="#1E1E2E"/>

  <!-- Subtle grid dots -->
  <g fill="#313244">
    <circle cx="80"  cy="80"  r="1.5"/>
    <circle cx="160" cy="80"  r="1.5"/>
    <circle cx="1120" cy="570" r="1.5"/>
    <circle cx="1040" cy="570" r="1.5"/>
  </g>

  <!-- Mark + wordmark -->
  <g transform="translate(80 80)">
    <rect x="0"  y="0"  width="44" height="10" rx="2" fill="#CBA6F7"/>
    <rect x="0"  y="18" width="34" height="10" rx="2" fill="#45475A"/>
    <rect x="0"  y="36" width="24" height="10" rx="2" fill="#45475A"/>
    <rect x="54" y="18" width="3"  height="10" rx="1" fill="#F9E2AF"/>
  </g>
  <text x="162" y="117"
        font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="30"
        font-weight="600"
        fill="#CDD6F4">claude-picker</text>

  <!-- Headline -->
  <text x="80" y="280"
        font-family="Inter, system-ui, sans-serif"
        font-size="84"
        font-weight="700"
        fill="#CDD6F4"
        letter-spacing="-3">Your Claude Code</text>
  <text x="80" y="372"
        font-family="Inter, system-ui, sans-serif"
        font-size="84"
        font-weight="700"
        fill="#CBA6F7"
        letter-spacing="-3">sessions, found.</text>

  <!-- Sub -->
  <text x="80" y="442"
        font-family="Inter, system-ui, sans-serif"
        font-size="26"
        font-weight="400"
        fill="#A6ADC8">A fzf-powered picker with previews, cost tracking, and full-text search.</text>

  <!-- Badges row -->
  <g font-family="'JetBrains Mono', monospace" font-size="18" fill="#A6ADC8">
    <rect x="80"  y="510" width="78"  height="38" rx="6" fill="#313244"/>
    <text x="119" y="535" text-anchor="middle">MIT</text>

    <rect x="170" y="510" width="136" height="38" rx="6" fill="#313244"/>
    <text x="238" y="535" text-anchor="middle">~800 lines</text>

    <rect x="318" y="510" width="206" height="38" rx="6" fill="#313244"/>
    <text x="421" y="535" text-anchor="middle">bash + python + fzf</text>

    <rect x="536" y="510" width="226" height="38" rx="6" fill="#313244"/>
    <text x="649" y="535" text-anchor="middle">works in any terminal</text>
  </g>
</svg>
