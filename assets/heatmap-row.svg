<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 80" role="img" aria-label="claude-picker project-cost 30-day heatmap row">
  <title>Stats dashboard: one row of the per-project 30-day cost heatmap</title>
  <style>
    .bg { fill: #1F1F28; }
    .name { fill: #DCD7BA; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 14px; font-weight: 600; }
    .total { fill: #FFFFFF; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 14px; font-weight: 700; }
    .label { fill: #727169; font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; font-size: 10px; letter-spacing: 1px; }
    .q0 { fill: #2A2A37; }
    .q1 { fill: #4A4035; }
    .q2 { fill: #85725A; }
    .q3 { fill: #DCA561; }
    .q4 { fill: #C34043; }
  </style>
  <rect class="bg" width="840" height="80" rx="4"/>
  <text x="16" y="20" class="label">PROJECT</text>
  <text x="16" y="50" class="name">architex</text>

  <text x="200" y="20" class="label">LAST 30 DAYS · QUANTILE-SHADED</text>

